<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Geometria Tactics</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="topbar">
        <div>
          <h1>Geometria Tactics</h1>
          <p id="phaseText">Preparando batalla</p>
        </div>
        <div class="scoreboard" aria-label="Estado de los equipos">
          <span class="team blue">Azul</span>
          <span id="roundText">Ronda 1</span>
          <span class="team red">Rojo</span>
        </div>
      </section>

      <section class="setup-screen" id="setupScreen" aria-live="polite">
        <div class="setup-copy">
          <div class="panel-title" id="setupEyebrow">Inicio</div>
          <h2 id="setupTitle">Geometria Tactics</h2>
          <p id="setupText">Prepara los equipos antes de entrar al edificio destruido.</p>
        </div>
        <div id="setupContent" class="setup-content"></div>
        <div id="setupActions" class="setup-actions"></div>
      </section>

      <section class="battlefield hidden" id="battlefield">
        <aside class="panel initiative-panel">
          <div class="panel-title">Turnos</div>
          <div class="initiative-track" id="initiativeTrack" aria-label="Barra de iniciativa"></div>
        </aside>

        <section class="board-area">
          <div class="board-shell">
            <div class="stacked-boards" id="board" aria-label="Tableros tacticos apilados"></div>
          </div>
        </section>

        <aside class="panel command-panel">
          <div class="panel-title">Unidad</div>
          <div id="unitCard" class="unit-card"></div>
          <div class="commands">
            <button id="attackBtn" type="button">Atacar</button>
            <button id="skillBtn" type="button">Habilidad</button>
            <button id="stairsUpBtn" type="button">Subir</button>
            <button id="stairsDownBtn" type="button">Bajar</button>
            <button id="endBtn" type="button">Terminar</button>
            <button id="restartBtn" type="button">Reiniciar</button>
          </div>
          <div id="abilityMenu" class="ability-menu hidden"></div>
          <div class="panel-title small">Registro</div>
          <ol id="log" class="log" aria-live="polite"></ol>
        </aside>
      </section>
    </main>

    <script src="maps/placeholder-map.js"></script>
    <script src="statistics/base-statistics.js"></script>
    <script src="abilities/basic-abilities.js"></script>
    <script src="characters/geometric-characters.js"></script>
    <script src="game.js"></script>
  </body>
</html>
